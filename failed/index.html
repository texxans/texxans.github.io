<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Failed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon {
            font-size: 60px;
            color: #e63946;
        }

        h1 {
            margin: 20px 0 10px;
            color: #333;
        }

        p {
            color: #666;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .retry {
            background: #e63946;
            color: #fff;
        }

        .home {
            background: #ddd;
            color: #333;
            margin-left: 10px;
        }

        .error-code {
            margin-top: 15px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">❌</div>
    
    <h1>Payment Failed</h1>
    
    <p>Oops! Something went wrong while processing your payment.</p>
    <p>Please try again or use a different payment method.</p>

    <a href="/retry" class="btn retry">Try Again</a>
    <a href="/" class="btn home">Back to Home</a>

    <div class="error-code">
        Error Code: TEST_FAIL_001
    </div>
</div>

</body>
</html>
