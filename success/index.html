<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }

        .icon {
            font-size: 60px;
            color: #2ecc71;
        }

        h1 {
            margin: 20px 0 10px;
            color: #333;
        }

        p {
            color: #666;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .home {
            background: #2ecc71;
            color: #fff;
        }

        .orders {
            background: #ddd;
            color: #333;
            margin-left: 10px;
        }

        .details {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
            color: #444;
        }

        .details p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">✅</div>

    <h1>Payment Successful</h1>

    <p>Thank you! Your order has been placed successfully.</p>

    <div class="details">
        <p><strong>Order ID:</strong> #TEST12345</p>
        <p><strong>Amount Paid:</strong> $49.99</p>
        <p><strong>Status:</strong> Confirmed</p>
    </div>

    <a href="/" class="btn home">Go to Home</a>
    <a href="/orders" class="btn orders">View Orders</a>
</div>

</body>
</html>
